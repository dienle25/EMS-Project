<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><title>Đăng ký EWS</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head><body class="bg-light"><div class="container mt-5"><div class="row justify-content-center"><div class="col-md-5"><div class="card shadow p-4"><h3 class="text-center mb-4">Đăng ký Tài khoản</h3><form method="POST">{% csrf_token %}<div class="mb-3"><label>Tên đăng nhập (Mã SV)</label><input type="text" name="username" class="form-control" required></div><div class="mb-3"><label>Mật khẩu</label><input type="password" name="password" class="form-control" required></div><button type="submit" class="btn btn-success w-100">Đăng ký</button></form>{% if error %}<div class="alert alert-danger mt-3">{{ error }}</div>{% endif %}<p class="text-center mt-3">Đã có tài khoản? <a href="/login">Đăng nhập</a></p></div></div></div></div></body></html>
